<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>7小時 - 記帳與許願</title>
  
  <link rel="icon" href="IMG_2669.jpeg">
  <link rel="apple-touch-icon" href="IMG_2669.jpeg">

  <!-- 1. 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. 載入 FontAwesome 圖標庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 3. 載入 React 核心 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. 載入 Firebase 穩定版引擎 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    /* 確保日期選擇器不會強制溢出 */
    input[type="date"] {
      -webkit-appearance: none;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // ✅ Firebase 專屬金鑰
    // =========================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDKVLVYRGvsiuFmQIXuFCU9O2TBVVRb3gk",
      authDomain: "popcorn-ee2cc.firebaseapp.com",
      projectId: "popcorn-ee2cc",
      storageBucket: "popcorn-ee2cc.firebasestorage.app",
      messagingSenderId: "1095484888994",
      appId: "1:1095484888994:web:3d39b271a04d0935b0c4fb",
      measurementId: "G-N8CGBLE373"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'tnt-richrichboomboom';

    // 啟動 Firestore 離線持久化緩存機制
    db.enablePersistence({ synchronizeTabs: true })
      .catch(function(err) {
        console.warn("離線持久化啟動失敗:", err);
      });
      
    // 強制設定為本地持久登入
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    const { useState, useEffect, useRef } = React;
    const CATEGORIES = ['小卡', '專輯', '娃娃', '野周', '其他'];
    const PACKAGE_CATEGORIES = ['預購', '未出貨', '已出貨', '已到貨']; 

    function App() {
      // === 狀態管理 ===
      const [user, setUser] = useState(null); 
      const [authLoading, setAuthLoading] = useState(true);
      const [items, setItems] = useState([]); 
      const [funds, setFunds] = useState([]); 
      const [wishes, setWishes] = useState([]); 
      const [packages, setPackages] = useState([]); 
      const [profileData, setProfileData] = useState({ nickname: '', fandom: '', bio: '努力為愛發電，聰明控制預算！', avatar: null, dashboardBg: null });
      
      // UI 控制
      const [activeCategory, setActiveCategory] = useState('全部');
      const [activeWishCategory, setActiveWishCategory] = useState('全部'); 
      const [activePackageCategory, setActivePackageCategory] = useState('全部'); 
      
      const [swipedItemId, setSwipedItemId] = useState(null);
      const [swipedWishId, setSwipedWishId] = useState(null); 
      const [swipedPackageId, setSwipedPackageId] = useState(null); 
      const [touchStartX, setTouchStartX] = useState(0);
      
      // Modal 控制
      const [isModalOpen, setIsModalOpen] = useState(false); 
      const [isProfileOpen, setIsProfileOpen] = useState(false); 
      const [isFundModalOpen, setIsFundModalOpen] = useState(false); 
      const [isFundHistoryOpen, setIsFundHistoryOpen] = useState(false); 
      const [isWishlistOpen, setIsWishlistOpen] = useState(false); 
      const [isWishModalOpen, setIsWishModalOpen] = useState(false); 
      const [isPackageListOpen, setIsPackageListOpen] = useState(false); 
      const [isPackageFormOpen, setIsPackageFormOpen] = useState(false); 
      
      // === 新增：放大圖片狀態 ===
      const [enlargedImage, setEnlargedImage] = useState(null);

      // 自訂確認刪除彈窗狀態
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

      const [editingId, setEditingId] = useState(null); 
      const [editingWishId, setEditingWishId] = useState(null); 
      const [editingPackageId, setEditingPackageId] = useState(null); 
      
      const [isLoading, setIsLoading] = useState(false);
      const [isSavingProfile, setIsSavingProfile] = useState(false);
      
      // Toast 提示
      const [toastMessage, setToastMessage] = useState('');
      const [toastType, setToastType] = useState('success');
      
      // 認證表單
      const [isLoginMode, setIsLoginMode] = useState(true);
      const [authForm, setAuthForm] = useState({ email: '', password: '', confirmPassword: '' });
      const [authError, setAuthError] = useState('');
      const [isAuthProcessing, setIsAuthProcessing] = useState(false);

      const todayStr = new Date().toISOString().split('T')[0];
      const [newItem, setNewItem] = useState({ name: '', price: '', date: todayStr, image: null, category: '小卡' });
      const [newFund, setNewFund] = useState({ amount: '', reason: '', date: todayStr });
      const [newWish, setNewWish] = useState({ name: '', price: '', date: todayStr, image: null, category: '小卡' }); 
      
      const [newPackage, setNewPackage] = useState({ 
        name: '', price: '', date: todayStr, image: null, category: '未出貨',
        orderNumber: '', seller: '', buyer: '', website: '' 
      }); 

      const showToast = (msg, type = 'success') => {
        setToastMessage(msg);
        setToastType(type);
        setTimeout(() => setToastMessage(''), 3000);
      };

      // 呼叫確認刪除彈窗
      const openConfirmDelete = (message, confirmAction) => {
        setConfirmDialog({ isOpen: true, message, onConfirm: confirmAction });
      };

      // 關閉確認刪除彈窗
      const closeConfirmDelete = () => {
        setConfirmDialog({ isOpen: false, message: '', onConfirm: null });
      };

      // === 1. 監聽登入狀態 ===
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // === 2. 獲取資料 ===
      useEffect(() => {
        if (!user) {
          setItems([]); setFunds([]); setWishes([]); setPackages([]); return;
        }

        const profileRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('info');
        profileRef.onSnapshot((docSnap) => {
          if (docSnap.exists) { 
            setProfileData(docSnap.data() || {}); 
          } else { 
            setProfileData({ nickname: user.email.split('@')[0], fandom: '', bio: '努力為愛發電，聰明控制預算！', avatar: null, dashboardBg: null }); 
          }
        }, err => console.error("讀取設定檔失敗", err));

        const safeSort = (a, b) => {
          try {
            if (a.date !== b.date) {
                const dateA = a.date ? new Date(a.date).getTime() : 0;
                const dateB = b.date ? new Date(b.date).getTime() : 0;
                return dateB - dateA;
            }
            const timeA = (a.createdAt && typeof a.createdAt.toMillis === 'function') ? a.createdAt.toMillis() : 0;
            const timeB = (b.createdAt && typeof b.createdAt.toMillis === 'function') ? b.createdAt.toMillis() : 0;
            return timeB - timeA;
          } catch(e) { return 0; }
        };

        const itemsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stanchases');
        const unsubscribeItems = itemsRef.onSnapshot({ includeMetadataChanges: true }, (snapshot) => {
            const fetchedItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedItems.sort(safeSort);
            setItems(fetchedItems);
        }, (error) => console.error("讀取戰利品失敗:", error));

        const wishesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('wishes');
        const unsubscribeWishes = wishesRef.onSnapshot({ includeMetadataChanges: true }, (snapshot) => {
            const fetchedWishes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedWishes.sort(safeSort);
            setWishes(fetchedWishes);
        }, (error) => console.error("讀取許願池失敗:", error));

        const fundsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('funds');
        const unsubscribeFunds = fundsRef.onSnapshot({ includeMetadataChanges: true }, (snapshot) => {
            const fetchedFunds = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedFunds.sort(safeSort);
            setFunds(fetchedFunds);
        }, (error) => console.error("讀取基金失敗:", error));

        // 讀取包裹
        const packagesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('packages');
        const unsubscribePackages = packagesRef.onSnapshot({ includeMetadataChanges: true }, (snapshot) => {
            const fetchedPackages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedPackages.sort(safeSort);
            setPackages(fetchedPackages);
        }, (error) => console.error("讀取包裹失敗:", error));

        return () => { unsubscribeItems(); unsubscribeFunds(); unsubscribeWishes(); unsubscribePackages(); };
      }, [user]);

      // === 登入/註冊流程 ===
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        setAuthError(''); setIsAuthProcessing(true);
        try {
          if (!isLoginMode) {
            if (authForm.password !== authForm.confirmPassword) {
              setAuthError('兩次輸入的密碼不一致！'); setIsAuthProcessing(false); return;
            }
            await auth.createUserWithEmailAndPassword(authForm.email, authForm.password);
            showToast('註冊成功！已自動為您登入');
            setAuthForm({ ...authForm, password: '', confirmPassword: '' });
          } else {
            await auth.signInWithEmailAndPassword(authForm.email, authForm.password);
            showToast('歡迎回來！');
          }
        } catch(error) { 
          switch (error.code) {
            case 'auth/email-already-in-use': setAuthError('信箱已註冊，請直接點擊登入！'); break;
            case 'auth/invalid-email': setAuthError('信箱格式錯誤！'); break;
            case 'auth/wrong-password': case 'auth/user-not-found': case 'auth/invalid-credential': setAuthError('帳號或密碼錯誤！'); break;
            case 'auth/weak-password': setAuthError('密碼太短，至少需 6 個字元！'); break;
            default: setAuthError('連線錯誤，請稍後再試。');
          }
        } finally { setIsAuthProcessing(false); }
      };

      const handleLogout = async () => {
        try {
          await auth.signOut();
          setAuthForm({ email: user?.email || '', password: '', confirmPassword: '' });
          setIsProfileOpen(false);
          setIsWishlistOpen(false);
          setIsPackageListOpen(false);
          showToast('已安全登出');
        } catch(e) { console.error(e); }
      };

      // === 圖片壓縮 ===
      const processImage = (file, maxWidth, callback) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > height && width > maxWidth) { height *= maxWidth / width; width = maxWidth; } 
            else if (height > maxWidth) { width *= maxWidth / height; height = maxWidth; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleAvatarUpload = (e) => processImage(e.target.files[0], 200, (dataUrl) => setProfileData(p => ({...(p || {}), avatar: dataUrl})));
      const handleDashboardBgUpload = (e) => processImage(e.target.files[0], 600, (dataUrl) => setProfileData(p => ({...(p || {}), dashboardBg: dataUrl})));
      const handleItemImageUpload = (e) => processImage(e.target.files[0], 500, (dataUrl) => setNewItem(p => ({...(p || {}), image: dataUrl})));
      const handleWishImageUpload = (e) => processImage(e.target.files[0], 500, (dataUrl) => setNewWish(p => ({...(p || {}), image: dataUrl})));
      const handlePackageImageUpload = (e) => processImage(e.target.files[0], 500, (dataUrl) => setNewPackage(p => ({...(p || {}), image: dataUrl})));

      // === 資料庫操作 ===
      const handleSaveProfile = async (e) => {
        e.preventDefault();
        if (!user) return;
        setIsSavingProfile(true);
        try {
          const profileRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('info');
          await profileRef.set(profileData);
          setIsProfileOpen(false);
          showToast('設定已儲存！');
        } catch (error) { showToast('儲存失敗，請重試', 'error'); } finally { setIsSavingProfile(false); }
      };

      const handleSaveItem = async (e) => {
        e.preventDefault();
        if (!newItem.name || !newItem.price) { showToast('請填寫物品名稱與金額！', 'error'); return; }
        if (!user) return;
        setIsLoading(true);
        try {
          const itemsCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stanchases');
          const dataToSave = { name: newItem.name, price: parseFloat(newItem.price), date: newItem.date, image: newItem.image, category: newItem.category };
          if (editingId) {
            await itemsCol.doc(editingId).update(dataToSave);
            showToast('修改已儲存！');
          } else {
            await itemsCol.add({ ...dataToSave, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            showToast('新增成功！');
          }
          closeItemModal();
        } catch (error) { 
          showToast('儲存發生異常，已離線備份', 'error'); closeItemModal(); 
        } finally { setIsLoading(false); }
      };

      const handleSaveWish = async (e) => {
        e.preventDefault();
        if (!newWish.name || !newWish.price) { showToast('請填寫物品名稱與金額！', 'error'); return; }
        if (!user) return;
        setIsLoading(true);
        try {
          const wishesCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('wishes');
          const dataToSave = { name: newWish.name, price: parseFloat(newWish.price), date: newWish.date, image: newWish.image, category: newWish.category };
          if (editingWishId) {
            await wishesCol.doc(editingWishId).update(dataToSave);
            showToast('許願修改已儲存！');
          } else {
            await wishesCol.add({ ...dataToSave, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            showToast('已加入許願池！');
          }
          closeWishModal();
        } catch (error) { 
          showToast('儲存發生異常，已離線備份', 'error'); closeWishModal(); 
        } finally { setIsLoading(false); }
      };

      const handleSavePackage = async (e) => {
        e.preventDefault();
        if (!newPackage.name || !newPackage.price) { showToast('請填寫包裹名稱與金額！', 'error'); return; }
        if (!user) return;
        setIsLoading(true);
        try {
          const packagesCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('packages');
          const dataToSave = { 
            name: newPackage.name, price: parseFloat(newPackage.price), date: newPackage.date, 
            image: newPackage.image, category: newPackage.category,
            orderNumber: newPackage.orderNumber || '',
            seller: newPackage.seller || '',
            buyer: newPackage.buyer || '',
            website: newPackage.website || ''
          };
          
          if (editingPackageId) {
            await packagesCol.doc(editingPackageId).update(dataToSave);
            showToast('包裹狀態已更新！');
          } else {
            await packagesCol.add({ ...dataToSave, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            showToast('包裹已新增！');
          }
          closePackageModal();
        } catch (error) { 
          showToast('儲存發生異常，已離線備份', 'error'); closePackageModal(); 
        } finally { setIsLoading(false); }
      };

      const handleDeleteItem = async (id) => {
        if (!user) return;
        try { 
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stanchases').doc(id).delete();
          showToast('紀錄已刪除');
        } catch (error) { showToast('刪除失敗', 'error'); }
      };

      const handleDeleteWish = async (id) => {
        if (!user) return;
        try { 
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('wishes').doc(id).delete();
          showToast('已從許願池移除');
        } catch (error) { showToast('刪除失敗', 'error'); }
      };

      const handleDeletePackage = async (id) => {
        if (!user) return;
        try { 
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('packages').doc(id).delete();
          showToast('包裹已移除');
        } catch (error) { showToast('刪除失敗', 'error'); }
      };

      const handleEditClick = (item) => {
        setEditingId(item.id);
        setNewItem({ name: item.name, price: item.price.toString(), date: item.date, image: item.image, category: item.category || '其他' });
        setSwipedItemId(null); setIsModalOpen(true);
      };

      const handleEditWishClick = (wish) => {
        setEditingWishId(wish.id);
        setNewWish({ name: wish.name, price: wish.price.toString(), date: wish.date, image: wish.image, category: wish.category || '小卡' });
        setSwipedWishId(null); setIsWishModalOpen(true);
      };

      const handleEditPackageClick = (pkg) => {
        setEditingPackageId(pkg.id);
        setNewPackage({ 
          name: pkg.name, price: pkg.price.toString(), date: pkg.date, 
          image: pkg.image, category: pkg.category || '未出貨',
          orderNumber: pkg.orderNumber || '', seller: pkg.seller || '', 
          buyer: pkg.buyer || '', website: pkg.website || ''
        });
        setSwipedPackageId(null); setIsPackageFormOpen(true);
      };

      const closeItemModal = () => { setIsModalOpen(false); setEditingId(null); setNewItem({ name: '', price: '', date: todayStr, image: null, category: '小卡' }); };
      const closeWishModal = () => { setIsWishModalOpen(false); setEditingWishId(null); setNewWish({ name: '', price: '', date: todayStr, image: null, category: '小卡' }); };
      const closePackageModal = () => { 
        setIsPackageFormOpen(false); setEditingPackageId(null); 
        setNewPackage({ name: '', price: '', date: todayStr, image: null, category: '未出貨', orderNumber: '', seller: '', buyer: '', website: '' }); 
      };

      const handleAddFund = async (e) => {
        e.preventDefault();
        if (!newFund.amount || !newFund.reason) { showToast('請填寫完整資訊！', 'error'); return; }
        if (!user) return;
        setIsLoading(true);
        try {
          const fundsCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('funds');
          await fundsCol.add({ amount: parseFloat(newFund.amount), reason: newFund.reason, date: newFund.date, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          setIsFundModalOpen(false); setNewFund({ amount: '', reason: '', date: todayStr }); showToast('餵食成功！');
        } catch (error) { showToast('發生異常', 'error'); setIsFundModalOpen(false); } finally { setIsLoading(false); }
      };

      const handleDeleteFund = async (id) => {
        if (!user) return;
        try { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('funds').doc(id).delete(); showToast('紀錄已刪除'); } catch (error) {}
      };

      // 手勢控制
      const handleTouchStart = (e) => setTouchStartX(e.touches[0].clientX);
      const handleTouchMove = (e, id, type = 'item') => {
        if (!touchStartX) return;
        const diff = touchStartX - e.touches[0].clientX;
        if (type === 'item') {
            if (diff > 50) setSwipedItemId(id); else if (diff < -50 && swipedItemId === id) setSwipedItemId(null);
        } else if (type === 'wish') {
            if (diff > 50) setSwipedWishId(id); else if (diff < -50 && swipedWishId === id) setSwipedWishId(null);
        } else if (type === 'package') {
            if (diff > 50) setSwipedPackageId(id); else if (diff < -50 && swipedPackageId === id) setSwipedPackageId(null);
        }
      };

      // === 過濾邏輯 ===
      const filteredItems = activeCategory === '全部' ? items : items.filter(i => (i.category || '其他') === activeCategory);
      const filteredWishes = activeWishCategory === '全部' ? wishes : wishes.filter(w => (w.category || '其他') === activeWishCategory);
      const filteredPackages = activePackageCategory === '全部' ? packages : packages.filter(p => (p.category || '未出貨') === activePackageCategory);

      // === 財務計算 ===
      const formatCurrency = (val) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(val || 0);
      const totalFunds = funds.reduce((sum, f) => sum + (Number(f.amount) || 0), 0);
      const totalSpent = items.reduce((sum, i) => sum + (Number(i.price) || 0), 0);
      
      const totalWishAmount = filteredWishes.reduce((sum, w) => sum + (Number(w.price) || 0), 0); 
      const totalPackageAmount = filteredPackages.reduce((sum, p) => sum + (Number(p.price) || 0), 0); 
      
      const balance = totalFunds - totalSpent;
      const displayNickname = profileData?.nickname || '專屬用戶';

      // ==========================================
      // 畫面渲染
      // ==========================================
      if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-yellow-50"><i className="fa-solid fa-spinner fa-spin text-yellow-400 text-5xl"></i></div>;

      // 未登入狀態
      if (!user) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-orange-50 flex items-center justify-center p-4">
            {toastMessage && (
              <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-lg text-sm flex items-center gap-2 transition-all ${toastType === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`}>
                {toastType === 'error' ? <i className="fa-solid fa-circle-exclamation"></i> : <i className="fa-solid fa-circle-check text-green-400"></i>}
                {toastMessage}
              </div>
            )}

                <div className="flex justify-between items-center p-6 border-b shrink-0">
                  <h3 className="text-xl font-bold flex items-center gap-2 text-orange-500">
                    <i className={editingPackageId ? "fa-solid fa-pen-to-square" : "fa-solid fa-box-open"}></i> {editingPackageId ? '更新包裹狀態' : '新增包裹紀錄'}
                  </h3>
                  <button type="button" onClick={closePackageModal} disabled={isLoading} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                
                <form onSubmit={handleSavePackage} className="p-6 overflow-y-auto space-y-4 scrollbar-hide">
                  <div className="h-40 border-2 border-dashed rounded-2xl relative overflow-hidden flex items-center justify-center bg-slate-50 group shrink-0">
                    <input type="file" onChange={handlePackageImageUpload} className="absolute inset-0 opacity-0 z-10 cursor-pointer" disabled={isLoading} />
                    {newPackage.image ? (
                      <img src={newPackage.image} className="w-full h-full object-cover" />
                    ) : (
                      <div className="text-center"><i className="fa-solid fa-image text-3xl text-slate-200 mx-auto"></i><p className="text-xs text-slate-400 mt-2">點擊上傳商品圖</p></div>
                    )}
                  </div>
                  
                  <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide shrink-0">
                    {PACKAGE_CATEGORIES.map(c => (
                      <button type="button" key={c} onClick={() => setNewPackage({...newPackage, category: c})} className={`px-5 py-2 rounded-full text-xs font-bold border transition-all ${newPackage.category === c ? 'bg-orange-500 text-white border-orange-500 shadow-md shadow-orange-500/20' : 'bg-white text-slate-500'}`}>{c}</button>
                    ))}
                  </div>

                  <input type="text" required value={newPackage.name} onChange={e => setNewPackage({...newPackage, name: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-orange-400 font-bold text-slate-700" placeholder="包裹內容物是什麼？" disabled={isLoading} />
                  
                  <div className="grid grid-cols-2 gap-3 w-full">
                    <div className="relative w-full overflow-hidden rounded-xl">
                      <i className="fa-solid fa-dollar-sign absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                      <input type="number" required min="0" value={newPackage.price} onChange={e => setNewPackage({...newPackage, price: e.target.value})} className="w-full box-border py-3.5 pl-8 pr-3 bg-slate-50 outline-none focus:ring-2 focus:ring-orange-400 font-bold" placeholder="金額" disabled={isLoading} />
                    </div>
                    <div className="relative w-full overflow-hidden rounded-xl">
                      <input type="date" value={newPackage.date} onChange={e => setNewPackage({...newPackage, date: e.target.value})} className="w-full box-border px-3 py-3.5 bg-slate-50 outline-none focus:ring-2 focus:ring-orange-400 text-sm" disabled={isLoading} />
                    </div>
                  </div>

                  <hr className="my-2 border-slate-100" />
                  
                  <h4 className="text-xs font-bold text-slate-400 px-1"><i className="fa-solid fa-circle-info"></i> 訂單詳細資訊 (選填)</h4>
                  
                  <div className="relative w-full overflow-hidden rounded-xl border">
                    <i className="fa-solid fa-hashtag absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                    <input type="text" value={newPackage.orderNumber} onChange={e => setNewPackage({...newPackage, orderNumber: e.target.value})} className="w-full box-border py-3.5 pl-10 pr-4 bg-white outline-none focus:ring-2 focus:ring-orange-400 text-sm" placeholder="訂單號碼" disabled={isLoading} />
                  </div>

                  <div className="grid grid-cols-2 gap-3 w-full">
                    <div className="relative w-full overflow-hidden rounded-xl border">
                      <i className="fa-solid fa-store absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                      <input type="text" value={newPackage.seller} onChange={e => setNewPackage({...newPackage, seller: e.target.value})} className="w-full box-border py-3.5 pl-9 pr-3 bg-white outline-none focus:ring-2 focus:ring-orange-400 text-sm" placeholder="賣家名稱" disabled={isLoading} />
                    </div>
                    <div className="relative w-full overflow-hidden rounded-xl border">
                      <i className="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                      <input type="text" value={newPackage.buyer} onChange={e => setNewPackage({...newPackage, buyer: e.target.value})} className="w-full box-border py-3.5 pl-9 pr-3 bg-white outline-none focus:ring-2 focus:ring-orange-400 text-sm" placeholder="買家 (代購)" disabled={isLoading} />
                    </div>
                  </div>

                  <div className="relative w-full overflow-hidden rounded-xl border pb-2 mb-2">
                    <i className="fa-solid fa-globe absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                    <input type="text" value={newPackage.website} onChange={e => setNewPackage({...newPackage, website: e.target.value})} className="w-full box-border py-3.5 pl-10 pr-4 bg-white outline-none focus:ring-2 focus:ring-orange-400 text-sm" placeholder="購買網站 (如: 蝦皮、微店)" disabled={isLoading} />
                  </div>
                  
                  <div className="pt-2 flex gap-3 sticky bottom-0 bg-white">
                    <button type="button" onClick={closePackageModal} disabled={isLoading} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold">取消</button>
                    <button type="submit" disabled={isLoading} className="flex-[2] bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-500/20 transition-transform active:scale-95 flex justify-center items-center">
                      {isLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : '儲存包裹'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal: 許願池主介面 */}
          {isWishlistOpen && (
            <div className="fixed inset-0 z-[50] bg-slate-50 flex flex-col animate-in slide-in-from-bottom-full overflow-hidden">
              <div className="bg-white px-4 py-3 sm:px-6 sm:py-4 shadow-sm border-b flex justify-between items-center sticky top-0 z-10">
                <div className="flex items-center gap-3">
                  <button onClick={() => setIsWishlistOpen(false)} className="bg-slate-100 w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors">
                    <i className="fa-solid fa-arrow-left text-slate-600"></i>
                  </button>
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i className="fa-solid fa-star text-yellow-400"></i> 許願池
                  </h2>
                </div>
                <div className="text-right">
                  <p className="text-xs text-slate-400 font-bold mb-0.5">
                    {activeWishCategory === '全部' ? '總需金額' : `${activeWishCategory}總計`}
                  </p>
                  <p className="text-xl sm:text-2xl font-black text-yellow-500 tracking-tight">{formatCurrency(totalWishAmount)}</p>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-4 max-w-4xl w-full mx-auto pb-24">
                <div className="flex gap-2 overflow-x-auto scrollbar-hide mb-6 -mx-4 px-4 sm:mx-0 sm:px-0">
                  {['全部', ...CATEGORIES].map(c => (
                    <button key={c} onClick={() => setActiveWishCategory(c)} className={`whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-sm ${activeWishCategory === c ? 'bg-yellow-500 text-white shadow-yellow-500/20' : 'bg-white text-slate-600 border border-slate-200'}`}>{c}</button>
                  ))}
                </div>

                {filteredWishes.length === 0 ? (
                  <div className="bg-white rounded-3xl p-8 text-center shadow-sm border border-slate-100 flex flex-col items-center justify-center min-h-[40vh]">
                    <div className="w-20 h-20 bg-yellow-50 rounded-full flex items-center justify-center mb-4"><i className="fa-solid fa-wand-magic-sparkles text-3xl text-yellow-300"></i></div>
                    <p className="text-slate-600 font-bold text-lg">許願池空空如也！</p>
                    <p className="text-slate-400 text-sm mt-2 mb-6">有什麼想買的酷東西嗎？趕快加進來吧</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                    {filteredWishes.map(wish => (
                      <div key={wish.id} className="relative rounded-2xl overflow-hidden bg-white shadow-sm border border-slate-100 group">
                        <div className="absolute inset-y-0 right-0 flex w-[120px]">
                          <button onClick={() => handleEditWishClick(wish)} className="w-1/2 bg-blue-500 text-white flex items-center justify-center"><i className="fa-solid fa-pen-to-square text-lg"></i></button>
                          <button onClick={() => { setSwipedWishId(null); openConfirmDelete('確認刪除這個許願？', () => handleDeleteWish(wish.id)); }} className="w-1/2 bg-red-500 text-white flex items-center justify-center"><i className="fa-solid fa-trash-can text-lg"></i></button>
                        </div>
                        <div className={`relative z-10 bg-white w-full h-full transition-transform duration-300 ${swipedWishId === wish.id ? '-translate-x-[120px]' : ''}`} onTouchStart={handleTouchStart} onTouchMove={(e) => handleTouchMove(e, wish.id, 'wish')}>
                          <div className="aspect-square bg-slate-50 relative overflow-hidden">
                            {/* === 修改：加入點擊放大 === */}
                            {wish.image ? <img src={wish.image} onClick={() => setEnlargedImage(wish.image)} className="w-full h-full object-cover opacity-80 cursor-pointer" /> : <div className="w-full h-full flex items-center justify-center text-slate-200 bg-slate-100"><i className="fa-solid fa-gift text-4xl"></i></div>}
                            <div className="absolute top-2 left-2 bg-white/90 backdrop-blur-sm px-2 py-0.5 rounded text-[10px] font-black text-yellow-600 uppercase">{wish.category}</div>
                            <div className="absolute bottom-2 right-2 bg-yellow-400/90 backdrop-blur-sm text-white w-6 h-6 rounded-full flex items-center justify-center shadow-sm"><i className="fa-solid fa-star text-[10px]"></i></div>
                          </div>
                          <div className="p-3">
                            <h4 className="font-bold text-slate-800 text-sm line-clamp-1">{wish.name}</h4>
                            <div className="text-yellow-500 font-black mt-1">{formatCurrency(wish.price)}</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              
              <button onClick={() => { closeWishModal(); setIsWishModalOpen(true); }} className="absolute bottom-6 right-6 z-[60] bg-yellow-400 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center border-4 border-white transition-transform active:scale-90">
                <i className="fa-solid fa-plus text-xl"></i>
              </button>
            </div>
          )}

          {/* Modal: 新增/編輯 許願物品 */}
          {isWishModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-in zoom-in-95">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold flex items-center gap-2 text-yellow-500">
                    <i className={editingWishId ? "fa-solid fa-pen-to-square" : "fa-solid fa-wand-magic-sparkles"}></i> {editingWishId ? '編輯許願' : '加入許願池'}
                  </h3>
                  <button type="button" onClick={closeWishModal} disabled={isLoading} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <form onSubmit={handleSaveWish} className="space-y-4">
                  <div className="h-40 border-2 border-dashed rounded-2xl relative overflow-hidden flex items-center justify-center bg-slate-50 group">
                    <input type="file" onChange={handleWishImageUpload} className="absolute inset-0 opacity-0 z-10 cursor-pointer" disabled={isLoading} />
                    {newWish.image ? (
                      <img src={newWish.image} className="w-full h-full object-cover" />
                    ) : (
                      <div className="text-center"><i className="fa-solid fa-image text-3xl text-slate-200 mx-auto"></i><p className="text-xs text-slate-400 mt-2">點擊上傳商品圖</p></div>
                    )}
                  </div>
                  <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    {CATEGORIES.map(c => (
                      <button type="button" key={c} onClick={() => setNewWish({...newWish, category: c})} className={`px-5 py-2 rounded-full text-xs font-bold border transition-all ${newWish.category === c ? 'bg-yellow-500 text-white border-yellow-500 shadow-md shadow-yellow-500/20' : 'bg-white text-slate-500'}`}>{c}</button>
                    ))}
                  </div>
                  <input type="text" required value={newWish.name} onChange={e => setNewWish({...newWish, name: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-yellow-400" placeholder="想要什麼酷東西？" disabled={isLoading} />
                  
                  <div className="grid grid-cols-2 gap-3 w-full">
                    <div className="relative w-full overflow-hidden rounded-xl">
                      <i className="fa-solid fa-dollar-sign absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                      <input type="number" required min="0" value={newWish.price} onChange={e => setNewWish({...newWish, price: e.target.value})} className="w-full box-border py-3.5 pl-8 pr-3 bg-slate-50 outline-none focus:ring-2 focus:ring-yellow-400 font-bold" placeholder="目標金額" disabled={isLoading} />
                    </div>
                    <div className="relative w-full overflow-hidden rounded-xl">
                      <input type="date" value={newWish.date} onChange={e => setNewWish({...newWish, date: e.target.value})} className="w-full box-border px-3 py-3.5 bg-slate-50 outline-none focus:ring-2 focus:ring-yellow-400 text-sm" disabled={isLoading} />
                    </div>
                  </div>
                  
                  <div className="pt-2 flex gap-3">
                    <button type="button" onClick={closeWishModal} disabled={isLoading} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold">取消</button>
                    <button type="submit" disabled={isLoading} className="flex-[2] bg-yellow-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-yellow-500/20 transition-transform active:scale-95 flex justify-center items-center">
                      {isLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : '確認許願'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal: 新增/編輯 戰利品 */}
          {isModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-in zoom-in-95">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold flex items-center gap-2 text-yellow-500">
                    <i className={editingId ? "fa-solid fa-pen-to-square" : "fa-solid fa-plus"}></i> {editingId ? '編輯紀錄' : '記一筆戰利品'}
                  </h3>
                  <button type="button" onClick={closeItemModal} disabled={isLoading} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <form onSubmit={handleSaveItem} className="space-y-4">
                  <div className="h-40 border-2 border-dashed rounded-2xl relative overflow-hidden flex items-center justify-center bg-slate-50 group">
                    <input type="file" onChange={handleItemImageUpload} className="absolute inset-0 opacity-0 z-10 cursor-pointer" disabled={isLoading} />
                    {newItem.image ? (
                      <img src={newItem.image} className="w-full h-full object-cover" />
                    ) : (
                      <div className="text-center"><i className="fa-solid fa-image text-3xl text-slate-200 mx-auto"></i><p className="text-xs text-slate-400 mt-2">點擊上傳商品圖</p></div>
                    )}
                  </div>
                  <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    {CATEGORIES.map(c => (
                      <button type="button" key={c} onClick={() => setNewItem({...newItem, category: c})} className={`px-5 py-2 rounded-full text-xs font-bold border transition-all ${newItem.category === c ? 'bg-yellow-500 text-white border-yellow-500 shadow-md shadow-yellow-500/20' : 'bg-white text-slate-500'}`}>{c}</button>
                    ))}
                  </div>
                  <input type="text" required value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-yellow-400" placeholder="買了什麼？" disabled={isLoading} />
                  
                  <div className="grid grid-cols-2 gap-3 w-full">
                    <div className="relative w-full overflow-hidden rounded-xl">
                      <i className="fa-solid fa-dollar-sign absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                      <input type="number" required min="0" value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} className="w-full min-w-0 py-3.5 pl-8 pr-3 bg-slate-50 outline-none focus:ring-2 focus:ring-yellow-400 font-bold" placeholder="多少錢" disabled={isLoading} />
                    </div>
                    <div className="relative w-full overflow-hidden rounded-xl">
                      <input type="date" value={newItem.date} onChange={e => setNewItem({...newItem, date: e.target.value})} className="w-full min-w-0 px-3 py-3.5 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-yellow-400 text-sm" disabled={isLoading} />
                    </div>
                  </div>

                  <div className="pt-2 flex gap-3">
                    <button type="button" onClick={closeItemModal} disabled={isLoading} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold">取消</button>
                    <button type="submit" disabled={isLoading} className="flex-[2] bg-yellow-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-yellow-500/20 transition-transform active:scale-95 flex justify-center items-center">
                      {isLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : '儲存紀錄'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal: 餵食小金庫 */}
          {isFundModalOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-in zoom-in-95">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-bold flex items-center gap-2 text-green-600"><i className="fa-solid fa-piggy-bank"></i> 餵食小金庫</h3>
                  <button type="button" onClick={() => setIsFundModalOpen(false)} disabled={isLoading} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <form onSubmit={handleAddFund} className="space-y-4">
                  <div className="relative">
                    <i className="fa-solid fa-dollar-sign absolute left-5 top-1/2 -translate-y-1/2 text-green-500 text-xl"></i>
                    <input type="number" required min="1" value={newFund.amount} onChange={e => setNewFund({...newFund, amount: e.target.value})} className="w-full p-5 pl-12 bg-green-50 rounded-2xl border border-green-100 text-3xl font-black text-green-600 outline-none focus:ring-2 focus:ring-green-400" placeholder="0" disabled={isLoading} />
                  </div>
                  <input type="text" required value={newFund.reason} onChange={e => setNewFund({...newFund, reason: e.target.value})} className="w-full p-4 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-green-400" placeholder="這筆錢的來源？ (例如: 零用錢、打工)" disabled={isLoading} />
                  <div className="pt-2 flex gap-3">
                    <button type="button" onClick={() => setIsFundModalOpen(false)} disabled={isLoading} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold">取消</button>
                    <button type="submit" disabled={isLoading} className="flex-[2] bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-500/20 transition-transform active:scale-95 flex justify-center items-center">
                      {isLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : '確認餵食'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal: 基金明細 */}
          {isFundHistoryOpen && (
            <div className="fixed inset-0 z-[70] flex items-end sm:items-center justify-center sm:p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-md h-[80vh] flex flex-col p-6 shadow-2xl animate-in slide-in-from-bottom-10 overflow-hidden">
                <div className="flex justify-between items-center mb-6">
                  <div>
                    <h3 className="text-xl font-bold flex items-center gap-2"><i className="fa-solid fa-clock-rotate-left text-slate-400"></i> 基金紀錄</h3>
                    <p className="text-xs text-slate-400 mt-1">目前總投入累計: {formatCurrency(totalFunds)}</p>
                  </div>
                  <button type="button" onClick={() => setIsFundHistoryOpen(false)} className="bg-slate-50 p-3 rounded-full hover:bg-slate-100"><i className="fa-solid fa-xmark"></i></button>
                </div>
                <div className="flex-grow overflow-y-auto space-y-3 pb-6 scrollbar-hide">
                  {funds.length === 0 ? (
                    <div className="text-center py-20 text-slate-300 font-bold"><i className="fa-solid fa-piggy-bank text-6xl opacity-20 block mb-4"></i> 還沒有任何餵食紀錄喔</div>
                  ) : (
                    funds.map(f => (
                      <div key={f.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 group transition-all hover:bg-green-50 hover:border-green-100">
                        <div><p className="font-bold text-slate-700 text-sm">{f.reason}</p><p className="text-[10px] text-slate-400 uppercase mt-0.5">{f.date}</p></div>
                        <div className="flex items-center gap-3">
                          <span className="text-green-600 font-black">+{formatCurrency(f.amount)}</span>
                          <button type="button" onClick={() => openConfirmDelete('確認刪除這筆餵食紀錄？', () => handleDeleteFund(f.id))} className="text-slate-200 hover:text-red-500 transition-colors p-2"><i className="fa-solid fa-trash-can"></i></button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {/* === 新增：點擊放大圖片的 Lightbox Modal === */}
          {enlargedImage && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setEnlargedImage(null)}>
              <button className="absolute top-6 right-6 text-white/70 hover:text-white p-2 z-10 transition-colors" onClick={() => setEnlargedImage(null)}>
                <i className="fa-solid fa-xmark text-3xl"></i>
              </button>
              <img 
                src={enlargedImage} 
                className="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl" 
                onClick={(e) => e.stopPropagation()} 
              />
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
